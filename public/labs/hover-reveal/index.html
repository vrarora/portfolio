<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clay to Metal Hover Shader</title>
    <link rel="stylesheet" href="./styles.css?v=23">
  </head>
  <body>
    <main class="shell">
      <section class="viewport-card">
        <div
          class="viewport"
          id="viewport"
          tabindex="0"
          aria-label="Interactive artwork with a clay-to-metal hover transition"
        >
          <canvas class="artwork-canvas" id="artworkCanvas"></canvas>
          <img
            class="artwork-preload"
            id="baseImage"
            src="./assets/ChatGPT%20Image%20May%2016,%202026,%2008_03_57%20PM.png"
            alt=""
            decoding="async"
            draggable="false"
            aria-hidden="true"
          >
          <img
            class="artwork-preload"
            id="metalImage"
            src="./assets/ChatGPT%20Image%20May%2017,%202026,%2004_29_42%20PM.png"
            alt=""
            decoding="async"
            draggable="false"
            aria-hidden="true"
          >
        </div>
      </section>
    </main>

    <script src="./script.js?v=23"></script>
  </body>
</html>
